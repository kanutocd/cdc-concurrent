plugins:
  - rubocop-minitest
  - rubocop-rake 
AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  CacheRootDirectory: tmp/rubocop_cache

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Minitest/MultipleAssertions:
  Max: 5
